<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Task List</h1>
            <button class="btn btn-add-task" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                + Add Task
            </button>
        </div>

        <div class="task-list" id="taskList">

            <div class="task-card mb-3 p-3 d-flex align-items-center">
                <div class="flex-grow-1">
                    <small class="text-muted">Task</small>
                    <div class="fw-semibold">Go to gym</div>
                </div>
                <div class="me-4 text-center">
                    <small class="text-muted">Priority</small>
                    <div class="priority-high fw-bold">High</div>
                </div>
                <div class="me-3">
                    <span class="badge bg-light text-dark border rounded-pill px-3 py-2">To Do</span>
                </div>
                <div class="me-3">
                    <div class="progress-circle"></div>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-icon btn-edit" title="Edit">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-sm btn-icon btn-delete" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Task 2: Read a book — Priority Low — Status: Done -->
            <div class="task-card mb-3 p-3 d-flex align-items-center">
                <div class="flex-grow-1">
                    <small class="text-muted">Task</small>
                    <div class="fw-semibold">Read a book</div>
                </div>
                <div class="me-4 text-center">
                    <small class="text-muted">Priority</small>
                    <div class="priority-low fw-bold">Low</div>
                </div>
                <div class="me-3">
                    <span class="badge bg-success text-white rounded-pill px-3 py-2">Done</span>
                </div>
                <div class="me-3">
                    <div class="progress-circle done"></div>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-icon btn-edit" title="Edit">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-sm btn-icon btn-delete" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Task 3: Go to market — Priority Medium — Status: In Progress -->
            <div class="task-card mb-3 p-3 d-flex align-items-center">
                <div class="flex-grow-1">
                    <small class="text-muted">Task</small>
                    <div class="fw-semibold">Go to market</div>
                </div>
                <div class="me-4 text-center">
                    <small class="text-muted">Priority</small>
                    <div class="priority-medium fw-bold">Medium</div>
                </div>
                <div class="me-3">
                    <span class="badge bg-warning text-dark rounded-pill px-3 py-2">In Progress</span>
                </div>
                <div class="me-3">
                    <div class="progress-circle in-progress"></div>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-icon btn-edit" title="Edit">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-sm btn-icon btn-delete" title="Delete">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- modal -->
    <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addTaskModalLabel">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="addTaskForm" novalidate>
                        <div class="mb-3">
                            <label for="taskName" class="form-label fw-bold text-muted small">Task</label>
                            <input type="text" 
                                   class="form-control rounded-pill" 
                                   id="taskName" 
                                   placeholder="Type your task here..."
                                   maxlength="100">
                            <div class="invalid-feedback" id="taskError">
                                Tên task không được vượt quá 100 ký tự!
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Priority</label>
                            <div class="d-flex gap-2" id="priorityGroup">
                                <button type="button" 
                                        class="btn btn-outline-danger priority-btn rounded-pill px-3" 
                                        data-priority="High">High</button>
                                <button type="button" 
                                        class="btn btn-outline-warning priority-btn rounded-pill px-3" 
                                        data-priority="Medium">Medium</button>
                                <button type="button" 
                                        class="btn btn-success priority-btn rounded-pill px-3 active" 
                                        data-priority="Low">Low</button>
                            </div>
                            <input type="hidden" id="taskPriority" value="Low">
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-add rounded-pill px-4" id="btnAdd">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
