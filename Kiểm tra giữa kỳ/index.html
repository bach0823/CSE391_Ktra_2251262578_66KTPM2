<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4 shadow-sm border-2 rounded py-3 px-5 bg-body-secondary">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Task List</h1>
            <button class="btn btn-info bg-primary text-white px-3 py-2" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                + Add Task
            </button>
        </div>

        <div class="task-list" id="taskList">
        </div>
    </div>


    
    <!-- modal -->
    <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addTaskModalLabel">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="addTaskForm" novalidate>
                        <!-- task -->
                        <div class="mb-3">
                            <label for="taskName" class="form-label fw-bold text-muted small">Task</label>
                            <input type="text" 
                                   class="form-control rounded-pill" 
                                   id="taskName" 
                                   placeholder="Type your task here..."
                                   maxlength="100">
                            <div class="invalid-feedback" id="taskError">
                                Tên task không được vượt quá 100 ký tự!
                            </div>
                        </div>

                        <!-- priority -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Priority</label>
                            <div class="d-flex gap-2" id="priorityGroup">
                                <button type="button" 
                                        class="btn btn-outline-danger priority-btn rounded-pill px-3" 
                                        data-priority="High">High</button>
                                <button type="button" 
                                        class="btn btn-outline-warning priority-btn rounded-pill px-3" 
                                        data-priority="Medium">Medium</button>
                                <button type="button" 
                                        class="btn btn-success priority-btn rounded-pill px-3 active" 
                                        data-priority="Low">Low</button>
                            </div>
                            <input type="hidden" id="taskPriority" value="Low">
                        </div>

                        <!-- status -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Status</label>
                            <div class="d-flex gap-2" id="statusGroup">
                                <button type="button" 
                                        class="btn btn-outline-dark status-btn rounded-pill px-3 active" 
                                        data-status="To Do">To Do</button>
                                <button type="button" 
                                        class="btn btn-outline-dark status-btn rounded-pill px-3" 
                                        data-status="Done">Done</button>
                                <button type="button" 
                                        class="btn btn-outline-dark status-btn rounded-pill px-3" 
                                        data-status="In Progress">In Progress</button>
                            </div>
                            <input type="hidden" id="taskStatus" value="To Do">
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0">
                    <button type="button" class="btn bg-secondary text-light rounded-pill px-4" id="btnAdd">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="script.js"></script>
<script src="/bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
</body>
</html>
